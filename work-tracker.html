<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作事項追蹤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: #e2e0d8;
  --border2: #ccc9be;
  --text: #1a1917;
  --text2: #6b6860;
  --text3: #a09d95;
  --blue: #185FA5;
  --blue-bg: #E6F1FB;
  --blue-text: #0C447C;
  --green: #0F6E56;
  --green-bg: #E1F5EE;
  --green-text: #085041;
  --amber: #854F0B;
  --amber-bg: #FAEEDA;
  --amber-text: #633806;
  --red: #A32D2D;
  --red-bg: #FCEBEB;
  --red-text: #791F1F;
  --purple: #534AB7;
  --purple-bg: #EEEDFE;
  --purple-text: #3C3489;
  --pink: #993556;
  --pink-bg: #FBEAF0;
  --pink-text: #72243E;
  --gray-bg: #F1EFE8;
  --gray-text: #444441;
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}
/* Layout */
.app { max-width: 720px; margin: 0 auto; padding: 0 16px 80px; }
/* Header */
.header {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg);
  padding: 16px 0 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header-actions { display: flex; gap: 8px; }
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); background: var(--surface);
  font-size: 13px; font-family: inherit; cursor: pointer; color: var(--text);
  transition: background 0.12s;
}
.btn:hover { background: var(--surface2); }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: var(--blue-text); }
/* Filter pills */
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); background: var(--surface); cursor: pointer;
  color: var(--text2); transition: all 0.1s;
}
.pill.active { border-color: var(--text); background: var(--text); color: #fff; }
/* Section */
.section { margin-bottom: 24px; }
.section-hd {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; padding: 0 2px;
}
.section-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.section-nm { font-size: 15px; font-weight: 700; }
.section-cnt { font-size: 12px; color: var(--text3); }
.section-add {
  margin-left: auto; background: none; border: none; font-size: 12px;
  color: var(--text3); cursor: pointer; padding: 3px 8px;
  border-radius: 4px; font-family: inherit;
}
.section-add:hover { color: var(--text2); background: var(--surface2); }
/* Task card */
.task-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 7px;
  display: flex; align-items: flex-start; gap: 10px;
  transition: border-color 0.1s;
}
.task-card:hover { border-color: var(--border2); }
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 14px; font-weight: 500; color: var(--text); }
.task-title.done { color: var(--text3); text-decoration: line-through; }
.task-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
.meta-date { font-size: 11px; color: var(--text3); }
.meta-note { font-size: 11px; color: var(--text3); font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
/* Status badge */
.status {
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
  cursor: pointer; border: none; font-family: inherit; white-space: nowrap; flex-shrink: 0;
  letter-spacing: 0.2px; transition: opacity 0.1s;
}
.status:hover { opacity: 0.8; }
.s-todo { background: var(--gray-bg); color: var(--gray-text); }
.s-doing { background: var(--amber-bg); color: var(--amber-text); }
.s-done { background: var(--green-bg); color: var(--green-text); }
.task-del {
  background: none; border: none; cursor: pointer; color: var(--text3);
  font-size: 13px; padding: 2px 4px; border-radius: 4px; flex-shrink: 0;
}
.task-del:hover { color: var(--red); background: var(--red-bg); }
/* Empty */
.empty { text-align: center; padding: 18px 0; font-size: 12px; color: var(--text3); }
/* Modal overlay */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100;
  display: flex; align-items: flex-end; justify-content: center;
  padding: 0;
}
@media (min-width: 520px) {
  .overlay { align-items: center; padding: 20px; }
}
.modal {
  background: var(--surface); width: 100%; max-width: 440px;
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px 20px 32px;
  max-height: 92vh; overflow-y: auto;
}
@media (min-width: 520px) {
  .modal { border-radius: var(--radius); padding: 24px; }
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.form-row { margin-bottom: 13px; }
.form-row label { font-size: 11px; font-weight: 700; color: var(--text2); display: block; margin-bottom: 5px; letter-spacing: 0.3px; }
.form-row input, .form-row select, .form-row textarea {
  width: 100%; border: 1px solid var(--border2); border-radius: var(--radius-sm);
  padding: 8px 11px; font-size: 14px; font-family: inherit;
  background: var(--surface); color: var(--text); resize: vertical;
  -webkit-appearance: none;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus {
  outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px var(--blue-bg);
}
.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
/* Color swatches */
.swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.swatch {
  width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s;
}
.swatch:hover { transform: scale(1.15); }
.swatch.sel { border-color: var(--text); }
/* Cat manage rows */
.cat-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.cat-row:last-child { border-bottom: none; }
.cat-row input {
  flex: 1; border: 1px solid var(--border2); border-radius: var(--radius-sm);
  padding: 5px 9px; font-size: 13px; font-family: inherit;
  background: var(--surface); color: var(--text);
}
/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: 9px 18px;
  border-radius: 20px; font-size: 13px; font-weight: 500;
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.toast.show { opacity: 1; }
/* Loading */
.loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--text2); z-index: 300;
}
</style>
</head>
<body>

<div class="loading" id="loading">載入中...</div>
<div class="toast" id="toast"></div>

<div class="app" id="app" style="display:none">
  <div class="header">
    <div class="header-top">
      <div class="header-title">工作事項追蹤</div>
      <div class="header-actions">
        <button class="btn" id="manageBtn">管理類別</button>
        <button class="btn btn-primary" id="addBtn">＋ 新增</button>
      </div>
    </div>
    <div class="filter-row" id="filterRow"></div>
  </div>
  <div id="sections"></div>
</div>

<!-- Modal area -->
<div id="modalArea"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const FB_CONFIG = {
  apiKey: "AIzaSyBEAddCvJVt1Z606uDlURg3AsZ2ns3Jxfw",
  authDomain: "ai-pacer-log.firebaseapp.com",
  projectId: "ai-pacer-log",
  storageBucket: "ai-pacer-log.firebasestorage.app",
  messagingSenderId: "629975239314",
  appId: "1:629975239314:web:e70693fccdf5a786e9744b",
  measurementId: "G-ELWEBPL7HR"
};

// ── Firebase init ──────────────────────────────────────────────
const app = initializeApp(FB_CONFIG);
const db = getFirestore(app);
const auth = getAuth(app);

const DOC_ID = 'work_tracker_main';
const COLORS = ['#185FA5','#0F6E56','#D85A30','#534AB7','#993556','#854F0B','#A32D2D','#888780'];
const COLOR_BG = {'#185FA5':'#E6F1FB','#0F6E56':'#E1F5EE','#D85A30':'#FAECE7','#534AB7':'#EEEDFE','#993556':'#FBEAF0','#854F0B':'#FAEEDA','#A32D2D':'#FCEBEB','#888780':'#F1EFE8'};
const COLOR_TEXT = {'#185FA5':'#0C447C','#0F6E56':'#085041','#D85A30':'#712B13','#534AB7':'#3C3489','#993556':'#72243E','#854F0B':'#633806','#A32D2D':'#791F1F','#888780':'#444441'};

let state = { categories: [], tasks: [] };
let filterCat = 'all';
let showModal = null;
let presetCat = null;
let uid = null;

function defaultState() {
  return {
    categories: [
      { id: 'c1', name: '役男業務', color: '#185FA5' },
      { id: 'c2', name: '佐升正', color: '#0F6E56' },
      { id: 'c3', name: '性平業務', color: '#993556' },
      { id: 'c4', name: 'EAP業務', color: '#534AB7' },
    ],
    tasks: [
      { id: 't1', cat: 'c1', title: '退役業務處理', dateStart: '', dateEnd: '', status: 'doing', note: '' },
      { id: 't2', cat: 'c1', title: '輔導教育', dateStart: '', dateEnd: '', status: 'todo', note: '' },
      { id: 't3', cat: 'c2', title: '114年送審', dateStart: '', dateEnd: '2025-09-30', status: 'doing', note: '' },
      { id: 't4', cat: 'c2', title: '115年計算分數', dateStart: '2025-10-01', dateEnd: '2026-06-30', status: 'todo', note: '' },
      { id: 't5', cat: 'c3', title: '6月性平開會', dateStart: '2025-06-01', dateEnd: '2025-06-30', status: 'todo', note: '委員出席確認' },
      { id: 't6', cat: 'c4', title: 'EAP成果', dateStart: '', dateEnd: '2025-08-14', status: 'todo', note: '' },
    ]
  };
}

function getDocRef() {
  return doc(db, 'users', uid, 'data', DOC_ID);
}

async function loadFromFirebase() {
  try {
    const snap = await getDoc(getDocRef());
    if (snap.exists()) {
      state = snap.data();
    } else {
      state = defaultState();
      await saveToFirebase();
    }
  } catch (e) {
    state = defaultState();
  }
}

async function saveToFirebase() {
  try {
    await setDoc(getDocRef(), state);
  } catch (e) {
    showToast('儲存失敗，請檢查網路');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function fmtDate(d) {
  if (!d) return '';
  const p = d.split('-');
  return p.length === 3 ? `${parseInt(p[1])}/${parseInt(p[2])}` : '';
}

function statusLabel(s) { return s === 'todo' ? '未開始' : s === 'doing' ? '進行中' : '完成'; }
function statusClass(s) { return s === 'todo' ? 's-todo' : s === 'doing' ? 's-doing' : 's-done'; }
function nextStatus(s) { return s === 'todo' ? 'doing' : s === 'doing' ? 'done' : 'todo'; }
function uid6() { return Math.random().toString(36).slice(2, 8); }

function render() {
  renderFilters();
  renderSections();
  renderModal();
}

function renderFilters() {
  const row = document.getElementById('filterRow');
  let html = `<button class="pill${filterCat === 'all' ? ' active' : ''}" data-f="all">全部</button>`;
  state.categories.forEach(c => {
    html += `<button class="pill${filterCat === c.id ? ' active' : ''}" data-f="${c.id}" style="${filterCat === c.id ? `background:${c.color};border-color:${c.color};color:#fff` : `border-left:3px solid ${c.color}`}">${c.name}</button>`;
  });
  row.innerHTML = html;
  row.querySelectorAll('[data-f]').forEach(b => b.addEventListener('click', () => { filterCat = b.dataset.f; render(); }));
}

function renderSections() {
  const el = document.getElementById('sections');
  const cats = filterCat === 'all' ? state.categories : state.categories.filter(c => c.id === filterCat);
  if (!cats.length) { el.innerHTML = '<div class="empty">沒有業務類別</div>'; return; }
  let html = '';
  cats.forEach(cat => {
    const tasks = state.tasks.filter(t => t.cat === cat.id);
    html += `<div class="section">
      <div class="section-hd">
        <div class="section-dot" style="background:${cat.color}"></div>
        <span class="section-nm">${cat.name}</span>
        <span class="section-cnt">${tasks.length} 項</span>
        <button class="section-add" data-addcat="${cat.id}">＋ 新增</button>
      </div>`;
    if (!tasks.length) {
      html += `<div class="empty">尚無事項，點「＋ 新增」加入</div>`;
    } else {
      tasks.forEach(t => {
        const dates = [fmtDate(t.dateStart), fmtDate(t.dateEnd)].filter(Boolean).join(' － ');
        html += `<div class="task-card">
          <div class="task-body">
            <div class="task-title${t.status === 'done' ? ' done' : ''}">${t.title}</div>
            <div class="task-meta">
              ${dates ? `<span class="meta-date">${dates}</span>` : ''}
              ${t.note ? `<span class="meta-note">${t.note}</span>` : ''}
            </div>
          </div>
          <button class="status ${statusClass(t.status)}" data-tog="${t.id}">${statusLabel(t.status)}</button>
          <button class="task-del" data-del="${t.id}">✕</button>
        </div>`;
      });
    }
    html += `</div>`;
  });
  el.innerHTML = html;
  el.querySelectorAll('[data-tog]').forEach(b => b.addEventListener('click', async () => {
    const t = state.tasks.find(x => x.id === b.dataset.tog);
    if (t) { t.status = nextStatus(t.status); await saveToFirebase(); render(); showToast('進度已更新'); }
  }));
  el.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
    if (!confirm('確定刪除這項事項？')) return;
    state.tasks = state.tasks.filter(x => x.id !== b.dataset.del);
    await saveToFirebase(); render(); showToast('已刪除');
  }));
  el.querySelectorAll('[data-addcat]').forEach(b => b.addEventListener('click', () => {
    presetCat = b.dataset.addcat; showModal = 'task'; render();
  }));
}

function renderModal() {
  const area = document.getElementById('modalArea');
  if (!showModal) { area.innerHTML = ''; return; }

  if (showModal === 'task') {
    const catOpts = state.categories.map(c =>
      `<option value="${c.id}"${presetCat === c.id ? ' selected' : ''}>${c.name}</option>`
    ).join('');
    area.innerHTML = `<div class="overlay" id="ov">
      <div class="modal">
        <div class="modal-title">新增事項</div>
        <div class="form-row"><label>事項名稱</label><input id="mT" type="text" placeholder="輸入事項名稱..."></div>
        <div class="form-row"><label>業務類別</label><select id="mC">${catOpts}</select></div>
        <div class="date-row">
          <div class="form-row"><label>開始日期</label><input id="mS" type="date"></div>
          <div class="form-row"><label>結束日期</label><input id="mE" type="date"></div>
        </div>
        <div class="form-row"><label>進度狀態</label><select id="mSt">
          <option value="todo">未開始</option><option value="doing">進行中</option><option value="done">完成</option>
        </select></div>
        <div class="form-row"><label>備註</label><textarea id="mN" rows="2" placeholder="補充說明（選填）..."></textarea></div>
        <div class="modal-actions">
          <button class="btn" id="mX">取消</button>
          <button class="btn btn-primary" id="mOk">儲存</button>
        </div>
      </div>
    </div>`;
    document.getElementById('ov').addEventListener('click', e => { if (e.target.id === 'ov') closeModal(); });
    document.getElementById('mX').addEventListener('click', closeModal);
    document.getElementById('mT').focus();
    document.getElementById('mOk').addEventListener('click', async () => {
      const title = document.getElementById('mT').value.trim();
      if (!title) { document.getElementById('mT').focus(); return; }
      state.tasks.push({
        id: uid6(), cat: document.getElementById('mC').value, title,
        dateStart: document.getElementById('mS').value,
        dateEnd: document.getElementById('mE').value,
        status: document.getElementById('mSt').value,
        note: document.getElementById('mN').value.trim()
      });
      await saveToFirebase(); closeModal(); render(); showToast('已新增');
    });
  }

  if (showModal === 'manage') {
    let catRows = state.categories.map(c => `
      <div class="cat-row" data-cid="${c.id}">
        <div class="section-dot" style="background:${c.color};flex-shrink:0;width:10px;height:10px"></div>
        <input class="ci" value="${c.name}" data-cid="${c.id}">
        <button class="task-del" data-dc="${c.id}">✕</button>
      </div>`).join('');
    let swatches = COLORS.map(col =>
      `<div class="swatch" data-col="${col}" style="background:${col}"></div>`
    ).join('');
    area.innerHTML = `<div class="overlay" id="ov2">
      <div class="modal">
        <div class="modal-title">管理業務類別</div>
        <div id="catList">${catRows}</div>
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
          <div class="form-row"><label>新增類別名稱</label><input id="ncn" type="text" placeholder="類別名稱..."></div>
          <div class="form-row"><label>選擇顏色</label><div class="swatches" id="swRow">${swatches}</div></div>
        </div>
        <div class="modal-actions">
          <button class="btn" id="mX2">關閉</button>
          <button class="btn btn-primary" id="mAdd">新增類別</button>
        </div>
      </div>
    </div>`;
    let picked = COLORS[0];
    document.querySelector(`.swatch[data-col="${picked}"]`).classList.add('sel');
    document.getElementById('ov2').addEventListener('click', e => { if (e.target.id === 'ov2') closeModal(); });
    document.getElementById('mX2').addEventListener('click', closeModal);
    document.querySelectorAll('.swatch').forEach(s => {
      s.addEventListener('click', () => {
        picked = s.dataset.col;
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('sel'));
        s.classList.add('sel');
      });
    });
    document.querySelectorAll('.ci').forEach(inp => {
      inp.addEventListener('change', async () => {
        const c = state.categories.find(x => x.id === inp.dataset.cid);
        if (c && inp.value.trim()) { c.name = inp.value.trim(); await saveToFirebase(); showToast('已更新'); }
      });
    });
    document.querySelectorAll('[data-dc]').forEach(b => {
      b.addEventListener('click', async () => {
        if (state.categories.length <= 1) { showToast('至少保留一個類別'); return; }
        if (!confirm('刪除類別也會刪除其下所有事項，確定嗎？')) return;
        const id = b.dataset.dc;
        state.categories = state.categories.filter(x => x.id !== id);
        state.tasks = state.tasks.filter(x => x.cat !== id);
        await saveToFirebase(); closeModal(); render(); showToast('已刪除');
      });
    });
    document.getElementById('mAdd').addEventListener('click', async () => {
      const name = document.getElementById('ncn').value.trim();
      if (!name) return;
      state.categories.push({ id: uid6(), name, color: picked });
      await saveToFirebase(); closeModal(); render(); showToast('已新增類別');
    });
  }
}

function closeModal() { showModal = null; presetCat = null; render(); }

document.getElementById('addBtn').addEventListener('click', () => { showModal = 'task'; presetCat = null; render(); });
document.getElementById('manageBtn').addEventListener('click', () => { showModal = 'manage'; render(); });

// Auth & load
onAuthStateChanged(auth, async user => {
  if (user) {
    uid = user.uid;
    await loadFromFirebase();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
  }
});

signInAnonymously(auth).catch(() => {
  document.getElementById('loading').textContent = '連線失敗，請重新整理';
});
</script>
</body>
</html>
