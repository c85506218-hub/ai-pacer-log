<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作事項追蹤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0; --surface: #ffffff; --surface2: #f0efe9;
  --border: #e2e0d8; --border2: #ccc9be;
  --text: #1a1917; --text2: #6b6860; --text3: #a09d95;
  --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #0C447C;
  --green: #0F6E56; --green-bg: #E1F5EE;
  --amber-bg: #FAEEDA; --amber-text: #633806;
  --red: #A32D2D; --red-bg: #FCEBEB;
  --gray-bg: #F1EFE8; --gray-text: #444441;
  --radius: 10px; --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }
.app { max-width: 720px; margin: 0 auto; padding: 0 16px 80px; }
.header { position: sticky; top: 0; z-index: 50; background: var(--bg); padding: 16px 0 12px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header-actions { display: flex; gap: 8px; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface); font-size: 13px; font-family: inherit; cursor: pointer; color: var(--text); transition: background 0.12s; }
.btn:hover { background: var(--surface2); }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: var(--blue-text); }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.pill { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: var(--surface); cursor: pointer; color: var(--text2); transition: all 0.1s; }
.pill.active { border-color: var(--text); background: var(--text); color: #fff; }
.section { margin-bottom: 24px; }
.section-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding: 0 2px; }
.section-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.section-nm { font-size: 15px; font-weight: 700; }
.section-cnt { font-size: 12px; color: var(--text3); }
.section-add { margin-left: auto; background: none; border: none; font-size: 12px; color: var(--text3); cursor: pointer; padding: 3px 8px; border-radius: 4px; font-family: inherit; }
.section-add:hover { color: var(--text2); background: var(--surface2); }
.task-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 7px; overflow: hidden; transition: border-color 0.1s; }
.task-card:hover { border-color: var(--border2); }
.task-top { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; }
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 14px; font-weight: 500; color: var(--text); }
.task-title.done { color: var(--text3); text-decoration: line-through; }
.task-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
.meta-date { font-size: 11px; color: var(--text3); }
.meta-note { font-size: 11px; color: var(--text3); font-style: italic; }
.meta-sub { font-size: 11px; color: var(--green); }
.task-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.status { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; white-space: nowrap; letter-spacing: 0.2px; transition: opacity 0.1s; }
.status:hover { opacity: 0.8; }
.s-todo { background: var(--gray-bg); color: var(--gray-text); }
.s-doing { background: var(--amber-bg); color: var(--amber-text); }
.s-done { background: var(--green-bg); color: var(--green); }
.task-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 13px; padding: 2px 4px; border-radius: 4px; }
.task-del:hover { color: var(--red); background: var(--red-bg); }
.expand-btn { background: none; border: 1px solid var(--border); cursor: pointer; color: var(--text2); font-size: 11px; padding: 2px 8px; border-radius: 20px; font-family: inherit; white-space: nowrap; transition: background 0.1s; }
.expand-btn:hover { background: var(--surface2); }
.subtasks { border-top: 1px solid var(--border); background: #faf9f6; padding: 10px 14px 12px; }
.sub-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.sub-item:last-of-type { border-bottom: none; }
.sub-check { width: 16px; height: 16px; border-radius: 3px; border: 1.5px solid var(--border2); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; background: transparent; transition: all 0.1s; user-select: none; }
.sub-check.done { background: var(--green); border-color: var(--green); }
.sub-text { flex: 1; font-size: 13px; color: var(--text); }
.sub-text.done { color: var(--text3); text-decoration: line-through; }
.sub-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 11px; padding: 2px 5px; border-radius: 3px; }
.sub-del:hover { color: var(--red); background: var(--red-bg); }
.sub-add-row { display: flex; gap: 6px; margin-top: 10px; }
.sub-add-row input { flex: 1; border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); }
.sub-add-row input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px var(--blue-bg); }
.sub-add-btn { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12px; font-family: inherit; cursor: pointer; color: var(--text2); white-space: nowrap; }
.sub-add-btn:hover { background: var(--surface2); }
.empty { text-align: center; padding: 18px 0; font-size: 12px; color: var(--text3); }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
@media (min-width: 520px) { .overlay { align-items: center; padding: 20px; } }
.modal { background: var(--surface); width: 100%; max-width: 440px; border-radius: var(--radius) var(--radius) 0 0; padding: 20px 20px 32px; max-height: 92vh; overflow-y: auto; }
@media (min-width: 520px) { .modal { border-radius: var(--radius); padding: 24px; } }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.form-row { margin-bottom: 13px; }
.form-row label { font-size: 11px; font-weight: 700; color: var(--text2); display: block; margin-bottom: 5px; letter-spacing: 0.3px; }
.form-row input, .form-row select, .form-row textarea { width: 100%; border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 11px; font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); resize: vertical; -webkit-appearance: none; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px var(--blue-bg); }
.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
.swatch:hover { transform: scale(1.15); }
.swatch.sel { border-color: var(--text); }
.cat-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.cat-row:last-child { border-bottom: none; }
.cat-row input { flex: 1; border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 5px 9px; font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 9px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.toast.show { opacity: 1; }
.loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text2); z-index: 300; }
</style>
</head>
<body>
<div class="loading" id="loading">載入中...</div>
<div class="toast" id="toast"></div>
<div class="app" id="app" style="display:none">
  <div class="header">
    <div class="header-top">
      <div class="header-title">工作事項追蹤</div>
      <div class="header-actions">
        <button class="btn" id="manageBtn">管理類別</button>
        <button class="btn btn-primary" id="addBtn">＋ 新增</button>
      </div>
    </div>
    <div class="filter-row" id="filterRow"></div>
  </div>
  <div id="sections"></div>
</div>
<div id="modalArea"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const FB_CONFIG = {
  apiKey: "AIzaSyBEAddCvJVt1Z606uDlURg3AsZ2ns3Jxfw",
  authDomain: "ai-pacer-log.firebaseapp.com",
  projectId: "ai-pacer-log",
  storageBucket: "ai-pacer-log.firebasestorage.app",
  messagingSenderId: "629975239314",
  appId: "1:629975239314:web:e70693fccdf5a786e9744b",
  measurementId: "G-ELWEBPL7HR"
};

const fbApp = initializeApp(FB_CONFIG);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
const DOC_ID = 'work_tracker_main';
const COLORS = ['#185FA5','#0F6E56','#D85A30','#534AB7','#993556','#854F0B','#A32D2D','#888780'];

let state = { categories: [], tasks: [] };
let filterCat = 'all';
let showModal = null;
let presetCat = null;
let expanded = new Set();
let uid = null;

function defaultState() {
  return {
    categories: [
      { id: 'c1', name: '役男業務', color: '#185FA5' },
      { id: 'c2', name: '佐升正', color: '#0F6E56' },
      { id: 'c3', name: '性平業務', color: '#993556' },
      { id: 'c4', name: 'EAP業務', color: '#534AB7' },
    ],
    tasks: [
      { id: 't1', cat: 'c1', title: '退役業務處理', dateStart: '', dateEnd: '', status: 'doing', note: '', subtasks: [] },
      { id: 't2', cat: 'c1', title: '輔導教育', dateStart: '', dateEnd: '', status: 'todo', note: '', subtasks: [] },
      { id: 't3', cat: 'c2', title: '114年送審', dateStart: '', dateEnd: '2025-09-30', status: 'doing', note: '', subtasks: [] },
      { id: 't4', cat: 'c2', title: '115年計算分數', dateStart: '2025-10-01', dateEnd: '2026-06-30', status: 'todo', note: '', subtasks: [] },
      { id: 't5', cat: 'c3', title: '6月性平開會', dateStart: '2025-06-01', dateEnd: '2025-06-30', status: 'todo', note: '委員出席確認', subtasks: [] },
      { id: 't6', cat: 'c4', title: 'EAP成果', dateStart: '', dateEnd: '2025-08-14', status: 'todo', note: '', subtasks: [] },
    ]
  };
}

function getRef() { return doc(db, 'users', uid, 'data', DOC_ID); }

async function load() {
  try {
    const snap = await getDoc(getRef());
    if (snap.exists()) {
      state = snap.data();
      state.tasks.forEach(t => { if (!t.subtasks) t.subtasks = []; });
    } else { state = defaultState(); await save(); }
  } catch(e) { state = defaultState(); }
}

async function save() {
  try { await setDoc(getRef(), state); }
  catch(e) { toast('儲存失敗，請檢查網路'); }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function fmt(d) {
  if (!d) return '';
  const p = d.split('-');
  return p.length === 3 ? `${parseInt(p[1])}/${parseInt(p[2])}` : '';
}

const sLabel = s => s==='todo'?'未開始':s==='doing'?'進行中':'完成';
const sCls = s => s==='todo'?'s-todo':s==='doing'?'s-doing':'s-done';
const sNext = s => s==='todo'?'doing':s==='doing'?'done':'todo';
const uid6 = () => Math.random().toString(36).slice(2,8);

function render() { renderFilters(); renderSections(); renderModal(); }

function renderFilters() {
  const row = document.getElementById('filterRow');
  let h = `<button class="pill${filterCat==='all'?' active':''}" data-f="all">全部</button>`;
  state.categories.forEach(c => {
    h += `<button class="pill${filterCat===c.id?' active':''}" data-f="${c.id}" style="${filterCat===c.id?`background:${c.color};border-color:${c.color};color:#fff`:`border-left:3px solid ${c.color}`}">${c.name}</button>`;
  });
  row.innerHTML = h;
  row.querySelectorAll('[data-f]').forEach(b => b.addEventListener('click', () => { filterCat = b.dataset.f; render(); }));
}

function renderSections() {
  const el = document.getElementById('sections');
  const cats = filterCat==='all' ? state.categories : state.categories.filter(c=>c.id===filterCat);
  if (!cats.length) { el.innerHTML='<div class="empty">沒有業務類別</div>'; return; }
  let h = '';
  cats.forEach(cat => {
    const tasks = state.tasks.filter(t => t.cat===cat.id);
    h += `<div class="section">
      <div class="section-hd">
        <div class="section-dot" style="background:${cat.color}"></div>
        <span class="section-nm">${cat.name}</span>
        <span class="section-cnt">${tasks.length} 項</span>
        <button class="section-add" data-addcat="${cat.id}">＋ 新增</button>
      </div>`;
    if (!tasks.length) {
      h += `<div class="empty">尚無事項，點「＋ 新增」加入</div>`;
    } else {
      tasks.forEach(t => {
        const subs = t.subtasks || [];
        const doneCnt = subs.filter(s=>s.done).length;
        const isExp = expanded.has(t.id);
        const dates = [fmt(t.dateStart), fmt(t.dateEnd)].filter(Boolean).join(' － ');
        h += `<div class="task-card">
          <div class="task-top">
            <div class="task-body">
              <div class="task-title${t.status==='done'?' done':''}">${t.title}</div>
              <div class="task-meta">
                ${dates?`<span class="meta-date">${dates}</span>`:''}
                ${t.note?`<span class="meta-note">${t.note}</span>`:''}
                ${subs.length?`<span class="meta-sub">${doneCnt}/${subs.length} 完成</span>`:''}
              </div>
            </div>
            <div class="task-right">
              <button class="expand-btn" data-exp="${t.id}">${isExp?'▲ 收起':`▼ 細項${subs.length?` (${subs.length})`:''}`}</button>
              <button class="status ${sCls(t.status)}" data-tog="${t.id}">${sLabel(t.status)}</button>
              <button class="task-del" data-del="${t.id}">✕</button>
            </div>
          </div>`;
        if (isExp) {
          h += `<div class="subtasks">`;
          if (subs.length === 0) h += `<div style="font-size:12px;color:var(--text3);padding:4px 0 8px">尚無細項，在下方輸入新增</div>`;
          subs.forEach(s => {
            h += `<div class="sub-item">
              <div class="sub-check${s.done?' done':''}" data-stog="${t.id}" data-sid="${s.id}">${s.done?'✓':''}</div>
              <span class="sub-text${s.done?' done':''}">${s.text}</span>
              <button class="sub-del" data-sdel="${t.id}" data-sid="${s.id}">✕</button>
            </div>`;
          });
          h += `<div class="sub-add-row">
            <input type="text" placeholder="輸入細項，按 Enter 新增..." id="si-${t.id}" maxlength="80">
            <button class="sub-add-btn" data-sadd="${t.id}">新增</button>
          </div></div>`;
        }
        h += `</div>`;
      });
    }
    h += `</div>`;
  });
  el.innerHTML = h;

  el.querySelectorAll('[data-tog]').forEach(b => b.addEventListener('click', async () => {
    const t = state.tasks.find(x=>x.id===b.dataset.tog);
    if (t) { t.status = sNext(t.status); await save(); render(); toast('進度已更新'); }
  }));
  el.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
    if (!confirm('確定刪除這項事項（含所有細項）？')) return;
    state.tasks = state.tasks.filter(x=>x.id!==b.dataset.del);
    expanded.delete(b.dataset.del);
    await save(); render(); toast('已刪除');
  }));
  el.querySelectorAll('[data-exp]').forEach(b => b.addEventListener('click', () => {
    const id = b.dataset.exp;
    expanded.has(id) ? expanded.delete(id) : expanded.add(id);
    render();
  }));
  el.querySelectorAll('[data-addcat]').forEach(b => b.addEventListener('click', () => {
    presetCat = b.dataset.addcat; showModal = 'task'; render();
  }));
  el.querySelectorAll('[data-stog]').forEach(b => b.addEventListener('click', async () => {
    const t = state.tasks.find(x=>x.id===b.dataset.stog);
    if (t) { const s = t.subtasks.find(x=>x.id===b.dataset.sid); if (s) { s.done=!s.done; await save(); render(); } }
  }));
  el.querySelectorAll('[data-sdel]').forEach(b => b.addEventListener('click', async () => {
    const t = state.tasks.find(x=>x.id===b.dataset.sdel);
    if (t) { t.subtasks = t.subtasks.filter(x=>x.id!==b.dataset.sid); await save(); render(); toast('細項已刪除'); }
  }));
  el.querySelectorAll('[data-sadd]').forEach(b => {
    const inp = document.getElementById(`si-${b.dataset.sadd}`);
    const doAdd = async () => {
      const text = inp ? inp.value.trim() : '';
      if (!text) return;
      const t = state.tasks.find(x=>x.id===b.dataset.sadd);
      if (t) { t.subtasks.push({ id: uid6(), text, done: false }); await save(); render(); toast('細項已新增'); }
    };
    b.addEventListener('click', doAdd);
    if (inp) inp.addEventListener('keydown', e => { if (e.key==='Enter') doAdd(); });
  });
}

function renderModal() {
  const area = document.getElementById('modalArea');
  if (!showModal) { area.innerHTML=''; return; }

  if (showModal==='task') {
    const opts = state.categories.map(c=>`<option value="${c.id}"${presetCat===c.id?' selected':''}>${c.name}</option>`).join('');
    area.innerHTML = `<div class="overlay" id="ov"><div class="modal">
      <div class="modal-title">新增事項</div>
      <div class="form-row"><label>事項名稱</label><input id="mT" type="text" placeholder="輸入事項名稱..."></div>
      <div class="form-row"><label>業務類別</label><select id="mC">${opts}</select></div>
      <div class="date-row">
        <div class="form-row"><label>開始日期</label><input id="mS" type="date"></div>
        <div class="form-row"><label>結束日期</label><input id="mE" type="date"></div>
      </div>
      <div class="form-row"><label>進度狀態</label><select id="mSt">
        <option value="todo">未開始</option><option value="doing">進行中</option><option value="done">完成</option>
      </select></div>
      <div class="form-row"><label>備註</label><textarea id="mN" rows="2" placeholder="補充說明（選填）..."></textarea></div>
      <div class="modal-actions">
        <button class="btn" id="mX">取消</button>
        <button class="btn btn-primary" id="mOk">儲存</button>
      </div>
    </div></div>`;
    document.getElementById('ov').addEventListener('click', e => { if(e.target.id==='ov') closeModal(); });
    document.getElementById('mX').addEventListener('click', closeModal);
    document.getElementById('mT').focus();
    document.getElementById('mOk').addEventListener('click', async () => {
      const title = document.getElementById('mT').value.trim();
      if (!title) { document.getElementById('mT').focus(); return; }
      state.tasks.push({ id: uid6(), cat: document.getElementById('mC').value, title, dateStart: document.getElementById('mS').value, dateEnd: document.getElementById('mE').value, status: document.getElementById('mSt').value, note: document.getElementById('mN').value.trim(), subtasks: [] });
      await save(); closeModal(); render(); toast('已新增');
    });
  }

  if (showModal==='manage') {
    const rows = state.categories.map(c=>`<div class="cat-row">
      <div class="section-dot" style="background:${c.color};width:10px;height:10px;flex-shrink:0"></div>
      <input class="ci" value="${c.name}" data-cid="${c.id}">
      <button class="task-del" data-dc="${c.id}">✕</button>
    </div>`).join('');
    const sw = COLORS.map(col=>`<div class="swatch" data-col="${col}" style="background:${col}"></div>`).join('');
    area.innerHTML = `<div class="overlay" id="ov2"><div class="modal">
      <div class="modal-title">管理業務類別</div>
      <div id="catList">${rows}</div>
      <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
        <div class="form-row"><label>新增類別名稱</label><input id="ncn" type="text" placeholder="類別名稱..."></div>
        <div class="form-row"><label>選擇顏色</label><div class="swatches">${sw}</div></div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="mX2">關閉</button>
        <button class="btn btn-primary" id="mAdd">新增類別</button>
      </div>
    </div></div>`;
    let picked = COLORS[0];
    document.querySelector(`.swatch[data-col="${picked}"]`).classList.add('sel');
    document.getElementById('ov2').addEventListener('click', e => { if(e.target.id==='ov2') closeModal(); });
    document.getElementById('mX2').addEventListener('click', closeModal);
    document.querySelectorAll('.swatch').forEach(s => s.addEventListener('click', () => {
      picked = s.dataset.col;
      document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel'));
      s.classList.add('sel');
    }));
    document.querySelectorAll('.ci').forEach(inp => inp.addEventListener('change', async () => {
      const c = state.categories.find(x=>x.id===inp.dataset.cid);
      if (c && inp.value.trim()) { c.name=inp.value.trim(); await save(); toast('已更新'); }
    }));
    document.querySelectorAll('[data-dc]').forEach(b => b.addEventListener('click', async () => {
      if (state.categories.length<=1) { toast('至少保留一個類別'); return; }
      if (!confirm('刪除類別也會刪除其下所有事項，確定嗎？')) return;
      const id = b.dataset.dc;
      state.categories = state.categories.filter(x=>x.id!==id);
      state.tasks = state.tasks.filter(x=>x.cat!==id);
      await save(); closeModal(); render(); toast('已刪除');
    }));
    document.getElementById('mAdd').addEventListener('click', async () => {
      const name = document.getElementById('ncn').value.trim();
      if (!name) return;
      state.categories.push({ id: uid6(), name, color: picked });
      await save(); closeModal(); render(); toast('已新增類別');
    });
  }
}

function closeModal() { showModal=null; presetCat=null; render(); }

document.getElementById('addBtn').addEventListener('click', () => { showModal='task'; presetCat=null; render(); });
document.getElementById('manageBtn').addEventListener('click', () => { showModal='manage'; render(); });

onAuthStateChanged(auth, async user => {
  if (user) {
    uid = user.uid;
    await load();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
  }
});
signInAnonymously(auth).catch(() => {
  document.getElementById('loading').textContent = '連線失敗，請重新整理';
});
</script>
</body>
